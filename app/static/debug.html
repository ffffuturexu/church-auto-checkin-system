<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系统调试工作台</title>
  <style>
    :root {
      --bg: #f3f6ef;
      --panel: #ffffff;
      --ink: #102a17;
      --sub: #4f6655;
      --ok: #2a8f4d;
      --warn: #bd7c25;
      --line: #c8d8c7;
      --accent: #0a5c36;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 10%, #dfeedd 0%, transparent 35%),
        radial-gradient(circle at 90% 20%, #d8ebe2 0%, transparent 40%),
        var(--bg);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1200px;
      margin: 20px auto;
      padding: 0 16px 24px;
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(12, 34, 17, 0.06);
    }
    h1 { margin: 0 0 10px; font-size: 22px; }
    h2 { margin: 0 0 10px; font-size: 16px; color: var(--sub); }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    input {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      min-width: 120px;
      background: #fff;
      color: var(--ink);
    }
    button {
      border: 0;
      border-radius: 8px;
      padding: 9px 12px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-weight: 600;
    }
    button.alt { background: #36554a; }
    button.warn { background: #8a5a2d; }
    .muted { color: var(--sub); font-size: 13px; }
    .hero-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .hero-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 240px;
    }
    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #0a5c36;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      border: 1px solid rgba(10, 92, 54, 0.18);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 6px 16px rgba(12, 34, 17, 0.06);
      white-space: nowrap;
    }
    .home-link:hover {
      background: rgba(248, 252, 249, 0.98);
    }
    .status { font-size: 13px; line-height: 1.5; }
    .status b.ok { color: var(--ok); }
    .status b.warn { color: var(--warn); }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .status-tile {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fbfdf8;
      padding: 12px;
      min-height: 92px;
    }
    .status-tile .label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
      letter-spacing: 0.02em;
    }
    .status-tile .value {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 4px;
    }
    .status-tile .detail {
      font-size: 12px;
      color: var(--sub);
      line-height: 1.45;
    }
    .status-tile.ok .value { color: var(--ok); }
    .status-tile.warn .value { color: var(--warn); }
    .status-tile.neutral .value { color: var(--ink); }
    .status-tile.hot .value { color: #a14c00; }
    .full { grid-column: 1 / -1; }
    #debugFrame {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #1d1f1f;
      min-height: 280px;
      object-fit: contain;
    }
    #events {
      margin: 0;
      padding: 0;
      list-style: none;
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fbfdf8;
    }
    #events li {
      padding: 8px 10px;
      border-bottom: 1px dashed var(--line);
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #events li:last-child { border-bottom: 0; }
    .hyperparams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 14px;
      margin-bottom: 12px;
    }
    .hyperparams-grid label {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .param-label {
      font-size: 12px;
      color: var(--sub);
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .hyperparams-grid input {
      min-width: 100%;
    }
    .params-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
      .hyperparams-grid { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero-top">
        <div class="hero-title-wrap">
          <h1>系统调试工作台</h1>
          <div class="muted">用于联调 Phase E：流媒体控制、参数热更新、双通道 WebSocket 观察。</div>
        </div>
        <a class="home-link" href="/">🏠 返回首页</a>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>流媒体控制</h2>
        <div class="row">
          <input id="source" placeholder="RTSP 或摄像头索引(如 0)" />
          <button id="startBtn">启动流</button>
          <button id="stopBtn" class="warn">停止流</button>
          <button id="refreshBtn" class="alt">刷新状态</button>
          <button id="restartBtn" class="warn">重启运行时</button>
        </div>
        <div id="status" class="status" style="margin-top:10px">状态读取中...</div>
      </div>

      <div class="card">
        <h2>超参数热更新</h2>
        <div class="hyperparams-grid">
          <label>
            <span class="param-label">阈值 (threshold)</span>
            <input id="threshold" type="number" step="0.01" min="0" max="1" />
          </label>
          <label>
            <span class="param-label">差值 (margin)</span>
            <input id="margin" type="number" step="0.01" min="0" max="1" />
          </label>
          <label>
            <span class="param-label">帧跳 (frame_skip)</span>
            <input id="frame_skip" type="number" step="1" min="1" />
          </label>
          <label>
            <span class="param-label">去重秒数 (dedupe_seconds)</span>
            <input id="dedupe_seconds" type="number" step="1" min="1" />
          </label>
          <label>
            <span class="param-label">投票最少样本 (vote_min_samples)</span>
            <input id="vote_min_samples" type="number" step="1" min="1" />
          </label>
          <label>
            <span class="param-label">投票窗口秒数 (vote_window_sec)</span>
            <input id="vote_window_sec" type="number" step="0.1" min="0.1" />
          </label>
          <label>
            <span class="param-label">投票比例 (vote_ratio)</span>
            <input id="vote_ratio" type="number" step="0.01" min="0" max="1" />
          </label>
          <label>
            <span class="param-label">未知人脸阈值 (unknown_min_similarity)</span>
            <input id="unknown_min_similarity" type="number" step="0.01" min="0" max="1" />
          </label>
          <label>
            <span class="param-label">最小人脸尺寸 (unknown_min_face_size)</span>
            <input id="unknown_min_face_size" type="number" step="1" min="1" />
          </label>
        </div>
        <div class="params-actions">
          <button id="updateParamsBtn">更新参数</button>
        </div>
      </div>
    </div>

    <div class="card full">
      <h2>运行状态总览</h2>
      <div class="muted">重点看摄像头是否持续出帧、识别端是否持续产出调试帧，以及系统资源是否异常。</div>
      <div id="statusGrid" class="status-grid"></div>
    </div>

    <div class="grid">
      <div class="card">
        <h2>Channel A（签到/事件）</h2>
        <ul id="events"></ul>
      </div>
      <div class="card">
        <h2>Channel B（调试视频）</h2>
        <div class="row" style="margin-bottom:8px">
          <button id="toggleDebugBtn" class="alt">关闭调试视频</button>
          <span id="debugVideoHint" class="muted">调试视频已开启</span>
        </div>
        <div class="row" style="margin-bottom:8px">
          <button id="toggleOverlayBtn" class="alt">关闭识别标注</button>
          <span id="debugOverlayHint" class="muted">识别标注已开启</span>
        </div>
        <img id="debugFrame" alt="debug frame" />
      </div>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusGridEl = document.getElementById('statusGrid');
    const eventsEl = document.getElementById('events');
    const imgEl = document.getElementById('debugFrame');
    const toggleDebugBtn = document.getElementById('toggleDebugBtn');
    const debugVideoHintEl = document.getElementById('debugVideoHint');
    const toggleOverlayBtn = document.getElementById('toggleOverlayBtn');
    const debugOverlayHintEl = document.getElementById('debugOverlayHint');

    let debugVideoEnabled = true;
    let debugOverlayEnabled = true;
    let channelBWs = null;
    let channelBPingTimer = null;
    let channelBReconnectTimer = null;

    const api = {
      async getStatus() {
        const res = await fetch('/system/status');
        return res.json();
      },
      async startStream(source) {
        const res = await fetch('/system/stream/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source: source || null })
        });
        return res.json();
      },
      async stopStream() {
        const res = await fetch('/system/stream/stop', { method: 'POST' });
        return res.json();
      },
      async restartSystem() {
        const res = await fetch('/system/restart', { method: 'POST' });
        return res.json();
      },
      async updateParams(payload) {
        const res = await fetch('/system/hyperparameters', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        return res.json();
      },
      async setDebugVideoEnabled(enabled) {
        const res = await fetch('/system/debug-video', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled })
        });
        return res.json();
      },
      async setDebugOverlayEnabled(enabled) {
        const res = await fetch('/system/debug-overlay', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enabled })
        });
        return res.json();
      }
    };

    function wsBase() {
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      return `${protocol}://${location.host}`;
    }

    function addEvent(event) {
      const safeEvent = { ...event };
      delete safeEvent.face_image_base64;
      delete safeEvent.image_base64;
      const li = document.createElement('li');
      li.textContent = JSON.stringify(safeEvent, null, 2);
      eventsEl.prepend(li);
      while (eventsEl.children.length > 80) {
        eventsEl.removeChild(eventsEl.lastChild);
      }
    }

    function renderStatus(data) {
      const rt = data.runtime || {};
      const system = data.system || {};
      const websocket = data.websocket || {};
      const cameraStats = rt.camera_stats || {};
      const recognitionStats = rt.recognition_stats || {};
      const stream = rt.stream_running ? '<b class="ok">运行中</b>' : '<b class="warn">未运行</b>';
      const cameraHealth = rt.camera_stream_healthy ? '正常' : '告警';
      const cameraAge = formatAge(rt.camera_last_frame_age_sec);
      const recognitionAge = formatAge(rt.recognition_last_debug_frame_age_sec);
      const loadAvg = formatLoadAvg(system);
      const rss = formatNumber(system.rss_mb, 1, ' MB');
      const cpuSeconds = formatNumber(system.cpu_seconds, 1, ' s');
      const gpuUsed = formatNumber(system.gpu_memory_used_mib, 0, ' MiB');
      const gpuTotal = formatNumber(system.gpu_memory_total_mib, 0, ' MiB');
      const gpuUtil = formatNumber(system.gpu_utilization_percent, 0, '%');
      const gpuTemp = formatNumber(system.gpu_temperature_c, 0, '°C');
      const gpuPower = formatGpuPower(system);
      const gpuUsageRatio = getGpuUsageRatio(system);
      const gpuTileClass = gpuUsageRatio === null ? 'neutral' : gpuUsageRatio >= 0.95 ? 'warn' : gpuUsageRatio >= 0.85 ? 'hot' : 'ok';
      const pendingRequests = recognitionStats.pending_requests ?? 'N/A';
      const frameQueueMax = rt.frame_queue_max ?? null;
      const eventQueueMax = rt.event_queue_max ?? null;
      const frameQueueRatio = getRatio(rt.frame_queue_size, frameQueueMax);
      const eventQueueRatio = getRatio(rt.event_queue_size, eventQueueMax);
      const queueTileClass = getQueueClass(frameQueueRatio, eventQueueRatio);
      statusEl.innerHTML = `
        流状态: ${stream}<br/>
        摄像头线程: ${rt.camera_running}<br/>
        识别线程: ${rt.recognition_running}<br/>
        帧队列: ${rt.frame_queue_size} | 事件队列: ${rt.event_queue_size}
      `;

      statusGridEl.innerHTML = `
        <div class="status-tile ${rt.camera_stream_healthy ? 'ok' : 'warn'}">
          <div class="label">摄像头状态</div>
          <div class="value">${cameraHealth}</div>
          <div class="detail">源: ${escapeHtml(String(rt.camera_source ?? 'unknown'))}<br/>最后一帧: ${cameraAge}<br/>捕获: ${cameraStats.frames_captured ?? 'N/A'} | 重连: ${cameraStats.reconnect_count ?? 'N/A'}</div>
        </div>
        <div class="status-tile ${rt.recognition_running ? 'ok' : 'warn'}">
          <div class="label">识别状态</div>
          <div class="value">${rt.recognition_running ? '运行中' : '未运行'}</div>
          <div class="detail">最后调试帧: ${recognitionAge}<br/>待处理请求: ${pendingRequests}<br/>最后错误: ${recognitionStats.last_error_at || '无'}</div>
        </div>
        <div class="status-tile ${queueTileClass}">
          <div class="label">队列负载</div>
          <div class="value">帧 ${formatQueue(rt.frame_queue_size, frameQueueMax)} | 事件 ${formatQueue(rt.event_queue_size, eventQueueMax)}</div>
          <div class="detail">帧队列: ${formatQueue(rt.frame_queue_size, frameQueueMax)} (${formatPercent(frameQueueRatio)})<br/>事件队列: ${formatQueue(rt.event_queue_size, eventQueueMax)} (${formatPercent(eventQueueRatio)})</div>
        </div>
        <div class="status-tile ${(websocket.channel_b_connections ?? 0) > 0 ? 'ok' : 'warn'}">
          <div class="label">调试视频通道</div>
          <div class="value">${websocket.channel_b_connections ?? 0} 个连接</div>
          <div class="detail">Channel A: ${websocket.channel_a_connections ?? 0}<br/>如果这里为 0，前端不会收到新画面。</div>
        </div>
        <div class="status-tile neutral">
          <div class="label">系统资源</div>
          <div class="value">${loadAvg}</div>
          <div class="detail">RSS: ${rss}<br/>CPU: ${cpuSeconds}<br/>PID: ${system.pid ?? 'N/A'}</div>
        </div>
        <div class="status-tile ${gpuTileClass}">
          <div class="label">GPU 状态</div>
          <div class="value">${gpuUsed} / ${gpuTotal}</div>
          <div class="detail">显存占用: ${formatPercent(gpuUsageRatio)}<br/>Util: ${gpuUtil}<br/>温度: ${gpuTemp}<br/>功耗: ${gpuPower}<br/>名称: ${escapeHtml(String(system.gpu_name ?? 'N/A'))}</div>
        </div>
      `;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatAge(value) {
      if (value === null || value === undefined) return '无';
      const seconds = Number(value);
      if (!Number.isFinite(seconds)) return String(value);
      if (seconds < 1) return '刚刚';
      return `${seconds.toFixed(seconds < 10 ? 1 : 0)} 秒前`;
    }

    function formatNumber(value, digits, suffix = '') {
      if (value === null || value === undefined) return 'N/A';
      const num = Number(value);
      if (!Number.isFinite(num)) return 'N/A';
      return `${num.toFixed(digits)}${suffix}`;
    }

    function formatLoadAvg(system) {
      const one = system.load_avg_1m;
      const five = system.load_avg_5m;
      const fifteen = system.load_avg_15m;
      if ([one, five, fifteen].some((v) => v === null || v === undefined)) return 'N/A';
      return `${Number(one).toFixed(2)} / ${Number(five).toFixed(2)} / ${Number(fifteen).toFixed(2)}`;
    }

    function formatPercent(value) {
      if (value === null || value === undefined) return 'N/A';
      return `${Math.round(value * 100)}%`;
    }

    function getGpuUsageRatio(system) {
      const used = Number(system.gpu_memory_used_mib);
      const total = Number(system.gpu_memory_total_mib);
      if (!Number.isFinite(used) || !Number.isFinite(total) || total <= 0) {
        return null;
      }
      return used / total;
    }

    function formatGpuPower(system) {
      const draw = system.gpu_power_usage_w;
      const limit = system.gpu_power_limit_w;
      if (draw === null || draw === undefined || limit === null || limit === undefined) {
        return 'N/A';
      }
      return `${Number(draw).toFixed(0)} / ${Number(limit).toFixed(0)} W`;
    }

    function getRatio(value, max) {
      const numerator = Number(value);
      const denominator = Number(max);
      if (!Number.isFinite(numerator) || !Number.isFinite(denominator) || denominator <= 0) {
        return null;
      }
      return numerator / denominator;
    }

    function getQueueClass(frameRatio, eventRatio) {
      if (frameRatio === null && eventRatio === null) return 'neutral';
      const worst = Math.max(frameRatio ?? 0, eventRatio ?? 0);
      if (worst >= 0.9) return 'warn';
      if (worst >= 0.7) return 'hot';
      return 'ok';
    }

    function formatQueue(value, max) {
      if (value === null || value === undefined) return 'N/A';
      if (max === null || max === undefined || Number(max) <= 0) return String(value);
      return `${value} / ${max}`;
    }

    function updateDebugVideoUi() {
      toggleDebugBtn.textContent = debugVideoEnabled ? '关闭调试视频' : '开启调试视频';
      debugVideoHintEl.textContent = debugVideoEnabled ? '调试视频已开启' : '调试视频已关闭';
    }

    function updateDebugOverlayUi() {
      toggleOverlayBtn.textContent = debugOverlayEnabled ? '关闭识别标注' : '开启识别标注';
      debugOverlayHintEl.textContent = debugOverlayEnabled ? '识别标注已开启' : '识别标注已关闭';
    }

    function closeChannelB() {
      if (channelBReconnectTimer) {
        clearTimeout(channelBReconnectTimer);
        channelBReconnectTimer = null;
      }
      if (channelBPingTimer) {
        clearInterval(channelBPingTimer);
        channelBPingTimer = null;
      }
      if (channelBWs) {
        channelBWs.onclose = null;
        channelBWs.close();
        channelBWs = null;
      }
      imgEl.removeAttribute('src');
    }

    async function setDebugVideoEnabled(enabled, notifyServer = true) {
      debugVideoEnabled = Boolean(enabled);
      updateDebugVideoUi();
      if (debugVideoEnabled) {
        connectChannelB();
      } else {
        closeChannelB();
      }
      if (!notifyServer) return;
      try {
        const data = await api.setDebugVideoEnabled(debugVideoEnabled);
        addEvent({ action: 'toggle_debug_video', data });
      } catch (e) {
        addEvent({ warn: `调试视频开关失败: ${e}` });
      }
    }

    async function setDebugOverlayEnabled(enabled, notifyServer = true) {
      debugOverlayEnabled = Boolean(enabled);
      updateDebugOverlayUi();
      if (!notifyServer) return;
      try {
        const data = await api.setDebugOverlayEnabled(debugOverlayEnabled);
        addEvent({ action: 'toggle_debug_overlay', data });
      } catch (e) {
        addEvent({ warn: `识别标注开关失败: ${e}` });
      }
    }

    async function refreshStatus() {
      try {
        const data = await api.getStatus();
        renderStatus(data);
        // 填充超参数输入框
        const params = data.hyperparams || {};
        if (params.threshold !== undefined) document.getElementById('threshold').value = params.threshold;
        if (params.margin !== undefined) document.getElementById('margin').value = params.margin;
        if (params.frame_skip !== undefined) document.getElementById('frame_skip').value = params.frame_skip;
        if (params.dedupe_seconds !== undefined) document.getElementById('dedupe_seconds').value = params.dedupe_seconds;
        if (params.vote_min_samples !== undefined) document.getElementById('vote_min_samples').value = params.vote_min_samples;
        if (params.vote_window_sec !== undefined) document.getElementById('vote_window_sec').value = params.vote_window_sec;
        if (params.vote_ratio !== undefined) document.getElementById('vote_ratio').value = params.vote_ratio;
        if (params.unknown_min_similarity !== undefined) document.getElementById('unknown_min_similarity').value = params.unknown_min_similarity;
        if (params.unknown_min_face_size !== undefined) document.getElementById('unknown_min_face_size').value = params.unknown_min_face_size;
        if (data.runtime && data.runtime.debug_video_enabled !== undefined) {
          setDebugVideoEnabled(Boolean(data.runtime.debug_video_enabled), false);
        }
        if (data.runtime && data.runtime.debug_overlay_enabled !== undefined) {
          setDebugOverlayEnabled(Boolean(data.runtime.debug_overlay_enabled), false);
        }
      } catch (e) {
        statusEl.textContent = `状态获取失败: ${e}`;
      }
    }

    function parseNum(id, parser) {
      const raw = document.getElementById(id).value.trim();
      if (!raw) return undefined;
      const v = parser(raw);
      return Number.isFinite(v) ? v : undefined;
    }

    function connectChannelA() {
      const ws = new WebSocket(`${wsBase()}/ws/channel-a`);
      ws.onopen = () => addEvent({ info: 'Channel A 已连接' });
      ws.onmessage = (evt) => {
        try {
          addEvent(JSON.parse(evt.data));
        } catch {
          addEvent({ raw: evt.data });
        }
      };
      ws.onclose = () => {
        addEvent({ warn: 'Channel A 断开，3秒后重连' });
        setTimeout(connectChannelA, 3000);
      };
      setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send('ping');
        }
      }, 15000);
    }

    function connectChannelB() {
      if (!debugVideoEnabled) return;
      if (channelBWs && channelBWs.readyState === WebSocket.OPEN) return;

      const ws = new WebSocket(`${wsBase()}/ws/channel-b`);
      channelBWs = ws;
      if (channelBPingTimer) {
        clearInterval(channelBPingTimer);
      }

      ws.onmessage = (evt) => {
        try {
          const payload = JSON.parse(evt.data);
          if (payload.image_base64) {
            imgEl.src = `data:image/jpeg;base64,${payload.image_base64}`;
          }
        } catch {
          // ignore malformed payload
        }
      };
      ws.onclose = () => {
        channelBWs = null;
        if (!debugVideoEnabled) return;
        channelBReconnectTimer = setTimeout(connectChannelB, 3000);
      };
      channelBPingTimer = setInterval(() => {
        if (ws.readyState === WebSocket.OPEN) {
          ws.send('ping');
        }
      }, 15000);
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
      const source = document.getElementById('source').value.trim();
      const data = await api.startStream(source);
      addEvent({ action: 'start_stream', data });
      renderStatus(data);
    });

    document.getElementById('stopBtn').addEventListener('click', async () => {
      const data = await api.stopStream();
      addEvent({ action: 'stop_stream', data });
      renderStatus(data);
    });

    document.getElementById('refreshBtn').addEventListener('click', refreshStatus);
    document.getElementById('restartBtn').addEventListener('click', async () => {
      const ok = confirm('确定要重启运行时吗？这会短暂中断识别线程。');
      if (!ok) return;
      const data = await api.restartSystem();
      addEvent({ action: 'restart_runtime', data });
      await refreshStatus();
    });

    document.getElementById('updateParamsBtn').addEventListener('click', async () => {
      const payload = {
        threshold: parseNum('threshold', parseFloat),
        margin: parseNum('margin', parseFloat),
        frame_skip: parseNum('frame_skip', Number),
        dedupe_seconds: parseNum('dedupe_seconds', Number),
        vote_min_samples: parseNum('vote_min_samples', Number),
        vote_window_sec: parseNum('vote_window_sec', parseFloat),
        vote_ratio: parseNum('vote_ratio', parseFloat),
        unknown_min_similarity: parseNum('unknown_min_similarity', parseFloat),
        unknown_min_face_size: parseNum('unknown_min_face_size', Number)
      };
      Object.keys(payload).forEach((k) => payload[k] === undefined && delete payload[k]);
      if (Object.keys(payload).length === 0) {
        addEvent({ warn: '未填写任何参数' });
        return;
      }
      const data = await api.updateParams(payload);
      addEvent({ action: 'update_hyperparameters', data });
      await refreshStatus();
    });

    toggleDebugBtn.addEventListener('click', async () => {
      await setDebugVideoEnabled(!debugVideoEnabled, true);
    });

    toggleOverlayBtn.addEventListener('click', async () => {
      await setDebugOverlayEnabled(!debugOverlayEnabled, true);
    });

    refreshStatus();
    connectChannelA();
    updateDebugVideoUi();
    updateDebugOverlayUi();
    connectChannelB();
    setInterval(refreshStatus, 3000);
  </script>
</body>
</html>
